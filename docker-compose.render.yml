version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: cbild-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: cbild_db
      MYSQL_USER: cbild_user
      MYSQL_PASSWORD: cbild_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cbild-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/cbild_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: cbild_user
      SPRING_DATASOURCE_PASSWORD: cbild_pass
      JWT_SECRET: mifos-cbild-gsoc2026-secret-key-aksh08022006
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: cbild-frontend
    depends_on:
      - backend
    ports:
      - "4200:80"

volumes:
  mysql_data:
