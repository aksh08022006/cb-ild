server:
  port: 8080

spring:
  application:
    name: cb-ild
  datasource:
    url: jdbc:mysql://localhost:3306/cbild_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: cbild_user
    password: cbild_pass
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: mifos-cbild-gsoc2026-secret-key-aksh08022006-very-long-secret
  expiration: 86400000   # 24 hours in ms

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    org.mifos.cbild: DEBUG
    org.springframework.security: WARN
